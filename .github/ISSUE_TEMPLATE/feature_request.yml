name: Feature Request
description: Suggest an idea for this project
title: "[Feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if a similar feature request already exists.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the feature or enhancement.
      placeholder: Summarize your feature request
    validations:
      required: true
  - type: dropdown
    id: event_type
    attributes:
      label: Related Notification Event
      description: Which notification event is this feature related to?
      options:
        - response_ready
        - error
        - permission_asked
        - question_asked
        - Not specific to an event
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: |
        Describe the problem you are facing or the use case that motivates this request.
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: |
        Describe your proposed solution for this feature.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: |
        List any alternative solutions you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or diagrams about the feature request here.
